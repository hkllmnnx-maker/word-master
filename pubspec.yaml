name: word_master
description: "Word Master - A powerful, advanced Word document editor."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Rich text editing engine
  flutter_quill: ^11.5.0

  # Local storage
  hive: 2.2.3
  hive_flutter: 1.1.0
  shared_preferences: 2.5.3

  # State management
  provider: 6.1.5+1

  # Utilities
  intl: ^0.20.2
  uuid: ^4.5.1
  path_provider: ^2.1.5
  share_plus: ^10.1.2
  google_fonts: ^6.2.1

  # Export / import
  pdf: ^3.11.1
  printing: ^5.13.4
  file_picker: ^8.1.6

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.13

flutter:
  uses-material-design: true

  assets:
    - assets/icons/
